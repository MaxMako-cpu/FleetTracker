<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PXGEO FleetTrack">
<meta name="theme-color" content="#0a0f1e">
<title>FleetTrack</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Barlow+Condensed:wght@300;400;600;700&display=swap');

:root {
--bg: #0a0f1e;
--surface: #111827;
--surface2: #1a2235;
--border: #1e3a5f;
--accent: #00d4ff;
--accent2: #00ff9d;
--warn: #ff6b35;
--text: #e2eaf5;
--muted: #5a7a9f;
--font-mono: 'Space Mono', monospace;
--font-ui: 'Barlow Condensed', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: var(--bg);
color: var(--text);
font-family: var(--font-ui);
height: 100dvh;
overflow: hidden;
display: flex;
flex-direction: column;
}

/* HEADER */
header {
position: relative;
z-index: 1000;
background: var(--surface);
border-bottom: 1px solid var(--border);
padding: 10px 16px;
display: flex;
align-items: center;
justify-content: space-between;
flex-shrink: 0;
padding-top: max(10px, env(safe-area-inset-top));
}

.logo {
display: flex;
align-items: center;
gap: 8px;
}

.logo-icon {
width: 28px;
height: 28px;
background: linear-gradient(135deg, var(--accent), var(--accent2));
border-radius: 6px;
display: flex;
align-items: center;
justify-content: center;
font-size: 14px;
}

.logo-text {
font-family: var(--font-mono);
font-size: 13px;
font-weight: 700;
letter-spacing: 2px;
color: var(--accent);
text-transform: uppercase;
}

.header-right {
display: flex;
align-items: center;
gap: 12px;
}

.live-badge {
display: flex;
align-items: center;
gap: 5px;
font-family: var(--font-mono);
font-size: 9px;
color: var(--accent2);
letter-spacing: 1px;
}

.live-dot {
width: 6px;
height: 6px;
border-radius: 50%;
background: var(--accent2);
animation: pulse 1.5s infinite;
}

@keyframes pulse {
0%, 100% { opacity: 1; transform: scale(1); }
50% { opacity: 0.4; transform: scale(0.7); }
}

.fleet-count {
font-family: var(--font-mono);
font-size: 10px;
color: var(--muted);
letter-spacing: 1px;
}

/* MAP */
#map {
flex: 1;
background: var(--bg);
z-index: 1;
}

/* Leaflet dark overrides */
.leaflet-tile { filter: brightness(0.7) saturate(0.8) hue-rotate(180deg) invert(1) hue-rotate(200deg); }
.leaflet-container { background: #0a1628; }
.leaflet-control-zoom a {
background: var(--surface2) !important;
color: var(--accent) !important;
border-color: var(--border) !important;
}
.leaflet-control-attribution { display: none; }

/* VESSEL MARKER */
.vessel-marker-wrap {
display: flex;
flex-direction: column;
align-items: center;
cursor: pointer;
}

.vessel-icon {
width: 22px;
height: 22px;
filter: drop-shadow(0 0 6px var(--accent));
}

.vessel-label {
font-family: var(--font-mono);
font-size: 8px;
color: var(--accent);
background: rgba(10,15,30,0.85);
border: 1px solid var(--border);
border-radius: 3px;
padding: 1px 4px;
margin-top: 2px;
white-space: nowrap;
letter-spacing: 0.5px;
}

/* BOTTOM PANEL */
#panel {
position: relative;
z-index: 1000;
background: var(--surface);
border-top: 1px solid var(--border);
flex-shrink: 0;
transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
padding-bottom: env(safe-area-inset-bottom);
}

/* Fleet strip */
#fleet-strip {
padding: 10px 16px;
overflow-x: auto;
scrollbar-width: none;
display: flex;
gap: 8px;
-webkit-overflow-scrolling: touch;
}
#fleet-strip::-webkit-scrollbar { display: none; }

.vessel-chip {
flex-shrink: 0;
background: var(--surface2);
border: 1px solid var(--border);
border-radius: 8px;
padding: 6px 12px;
cursor: pointer;
transition: all 0.2s;
display: flex;
flex-direction: column;
align-items: flex-start;
gap: 2px;
min-width: 100px;
}

.vessel-chip:active { transform: scale(0.96); }
.vessel-chip.active {
border-color: var(--accent);
background: rgba(0,212,255,0.08);
}

.chip-name {
font-family: var(--font-ui);
font-size: 12px;
font-weight: 600;
letter-spacing: 0.5px;
color: var(--text);
white-space: nowrap;
}

.chip-status {
font-family: var(--font-mono);
font-size: 8px;
letter-spacing: 0.5px;
}
.chip-status.underway { color: var(--accent2); }
.chip-status.anchored { color: var(--warn); }
.chip-status.moored { color: var(--muted); }

/* Detail card */
#detail-card {
display: none;
border-top: 1px solid var(--border);
padding: 14px 16px;
animation: slideUp 0.25s ease;
}
#detail-card.visible { display: block; }

@keyframes slideUp {
from { opacity: 0; transform: translateY(8px); }
to { opacity: 1; transform: translateY(0); }
}

.card-header {
display: flex;
justify-content: space-between;
align-items: flex-start;
margin-bottom: 12px;
}

.card-name {
font-family: var(--font-ui);
font-size: 20px;
font-weight: 700;
letter-spacing: 1px;
line-height: 1;
}

.card-imo {
font-family: var(--font-mono);
font-size: 9px;
color: var(--muted);
letter-spacing: 1px;
margin-top: 3px;
}

.status-badge {
font-family: var(--font-mono);
font-size: 9px;
font-weight: 700;
letter-spacing: 1.5px;
padding: 4px 8px;
border-radius: 4px;
text-transform: uppercase;
}
.status-badge.underway { background: rgba(0,255,157,0.12); color: var(--accent2); border: 1px solid rgba(0,255,157,0.3); }
.status-badge.anchored { background: rgba(255,107,53,0.12); color: var(--warn); border: 1px solid rgba(255,107,53,0.3); }
.status-badge.moored { background: rgba(90,122,159,0.12); color: var(--muted); border: 1px solid rgba(90,122,159,0.3); }

.card-grid {
display: grid;
grid-template-columns: 1fr 1fr 1fr;
gap: 8px;
margin-bottom: 10px;
}

.card-field {
background: var(--surface2);
border: 1px solid var(--border);
border-radius: 6px;
padding: 8px;
}

.field-label {
font-family: var(--font-mono);
font-size: 8px;
color: var(--muted);
letter-spacing: 1px;
text-transform: uppercase;
margin-bottom: 4px;
}

.field-value {
font-family: var(--font-ui);
font-size: 14px;
font-weight: 600;
color: var(--text);
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}

.field-value.accent { color: var(--accent); }

.route-row {
display: flex;
align-items: center;
gap: 8px;
background: var(--surface2);
border: 1px solid var(--border);
border-radius: 6px;
padding: 8px 12px;
}

.route-port {
flex: 1;
}

.port-label {
font-family: var(--font-mono);
font-size: 8px;
color: var(--muted);
letter-spacing: 1px;
margin-bottom: 2px;
}

.port-name {
font-family: var(--font-ui);
font-size: 13px;
font-weight: 600;
}

.route-arrow {
color: var(--accent);
font-size: 16px;
flex-shrink: 0;
}

.close-btn {
position: absolute;
top: 12px;
right: 16px;
background: none;
border: none;
color: var(--muted);
font-size: 18px;
cursor: pointer;
line-height: 1;
padding: 4px;
}
</style>
</head>
<body>

<header>
<div class="logo">
<div class="logo-icon">⚓</div>
<span class="logo-text">FleetTrack</span>
</div>
<div class="header-right">
<span class="fleet-count" id="fleet-count">— vessels</span>
<div class="live-badge">
<div class="live-dot"></div>
LIVE
</div>
</div>
</header>

<div id="map"></div>

<div id="panel">
<div id="fleet-strip"></div>
<div id="detail-card"></div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// ─── MOCK FLEET DATA ────────────────────────────────────────────────
// Replace this array with real AIS API data later
const FLEET = [
{
id: "V001",
name: "ISLAND FRONTIER",
imo: "IMO 9249520",
mmsi: "258866000",
lat: 23.5,
lng: -92.1,
heading: 45,
speed: 4.2,
course: 47,
status: "underway",
voyage: "SV-2024-047",
origin: "Port Fourchon",
destination: "MC 252",
draught: "5.2m",
eta: "14:30 UTC"
},
{
id: "V002",
name: "PXGEO2",
imo: "IMO 9620114",
mmsi: "311001040",
lat: 25.1,
lng: -88.7,
heading: 270,
speed: 0.0,
course: 0,
status: "anchored",
voyage: "SV-2024-041",
origin: "New Orleans",
destination: "GC 644",
draught: "6.8m",
eta: "On Station"
},
{
id: "V003",
name: "REM ANDES",
imo: "IMO 9606699",
mmsi: "210722000",
lat: 27.3,
lng: -90.4,
heading: 180,
speed: 5.8,
course: 183,
status: "underway",
voyage: "SV-2024-052",
origin: "Fourchon",
destination: "WR 143",
draught: "4.9m",
eta: "09:15 UTC"
},
{
id: "V004",
name: "FULMAR EXPLORER",
imo: "IMO 9418860",
mmsi: "210328000",
lat: 29.0,
lng: -89.1,
heading: 90,
speed: 0.0,
course: 0,
status: "moored",
voyage: "SV-2024-038",
origin: "Port Fourchon",
destination: "Port Fourchon",
draught: "3.1m",
eta: "Dockside"
},
{
id: "V005",
name: "SEA1 DORADO",
imo: "IMO 9424508",
mmsi: "311031800",
lat: 24.8,
lng: -94.2,
heading: 60,
speed: 6.1,
course: 62,
status: "underway",
voyage: "SV-2024-055",
origin: "Veracruz",
destination: "GC 955",
draught: "7.2m",
eta: "22:00 UTC"
},
{
id: "V006",
name: "SIDDIS MARINER",
imo: "IMO 9475181",
mmsi: "259795000",
lat: 22.1,
lng: -87.5,
heading: 315,
speed: 3.5,
course: 318,
status: "underway",
voyage: "SV-2024-049",
origin: "Tampico",
destination: "MC 394",
draught: "5.8m",
eta: "11:45 UTC"
}
];

// ─── MAP SETUP ──────────────────────────────────────────────────────
const map = L.map('map', {
center: [25.5, -90.5],
zoom: 6,
zoomControl: true,
attributionControl: false
});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
maxZoom: 18
}).addTo(map);

// ─── SVG VESSEL ICON ────────────────────────────────────────────────
function vesselSVG(heading, status) {
const colors = { underway: '#00ff9d', anchored: '#ff6b35', moored: '#5a7a9f' };
const c = colors[status] || '#00d4ff';
return `<svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg"
style="transform: rotate(${heading}deg);">
<polygon points="11,2 18,19 11,15 4,19" fill="${c}" opacity="0.9"/>
<polygon points="11,2 18,19 11,15 4,19" fill="none" stroke="${c}" stroke-width="1"/>
</svg>`;
}

function createVesselIcon(vessel) {
return L.divIcon({
className: '',
html: `<div class="vessel-marker-wrap">
${vesselSVG(vessel.heading, vessel.status)}
<span class="vessel-label">${vessel.name.split(' ')[0]}</span>
</div>`,
iconSize: [60, 40],
iconAnchor: [30, 11]
});
}

// ─── MARKERS ────────────────────────────────────────────────────────
let activeVessel = null;
const markers = {};

FLEET.forEach(v => {
const marker = L.marker([v.lat, v.lng], { icon: createVesselIcon(v) }).addTo(map);
marker.on('click', () => selectVessel(v));
markers[v.id] = marker;
});

// ─── FLEET STRIP ────────────────────────────────────────────────────
document.getElementById('fleet-count').textContent = `${FLEET.length} vessels`;

const strip = document.getElementById('fleet-strip');
FLEET.forEach(v => {
const chip = document.createElement('div');
chip.className = 'vessel-chip';
chip.dataset.id = v.id;
chip.innerHTML = `
<span class="chip-name">${v.name}</span>
<span class="chip-status ${v.status}">${v.status.toUpperCase()}</span>
`;
chip.addEventListener('click', () => selectVessel(v));
strip.appendChild(chip);
});

// ─── SELECT VESSEL ──────────────────────────────────────────────────
function selectVessel(v) {
if (activeVessel === v.id) {
clearSelection(); return;
}
activeVessel = v.id;

// Update chips
document.querySelectorAll('.vessel-chip').forEach(c => {
c.classList.toggle('active', c.dataset.id === v.id);
});

// Pan to vessel
map.flyTo([v.lat, v.lng], Math.max(map.getZoom(), 7), { duration: 0.8 });

// Show detail card
const card = document.getElementById('detail-card');
card.className = 'visible';
card.innerHTML = `
<button class="close-btn" onclick="clearSelection()">✕</button>
<div class="card-header">
<div>
<div class="card-name">${v.name}</div>
<div class="card-imo">${v.imo} · MMSI ${v.mmsi}</div>
</div>
<div class="status-badge ${v.status}">${v.status}</div>
</div>
<div class="card-grid">
<div class="card-field">
<div class="field-label">Speed</div>
<div class="field-value accent">${v.speed} kn</div>
</div>
<div class="card-field">
<div class="field-label">Course</div>
<div class="field-value">${v.course}°</div>
</div>
<div class="card-field">
<div class="field-label">Draught</div>
<div class="field-value">${v.draught}</div>
</div>
</div>
<div class="route-row">
<div class="route-port">
<div class="port-label">FROM</div>
<div class="port-name">${v.origin}</div>
</div>
<div class="route-arrow">→</div>
<div class="route-port">
<div class="port-label">TO</div>
<div class="port-name">${v.destination}</div>
</div>
<div class="route-port" style="text-align:right">
<div class="port-label">ETA</div>
<div class="port-name" style="font-size:12px">${v.eta}</div>
</div>
</div>
`;
}

function clearSelection() {
activeVessel = null;
document.querySelectorAll('.vessel-chip').forEach(c => c.classList.remove('active'));
document.getElementById('detail-card').className = '';
document.getElementById('detail-card').innerHTML = '';
}

// ─── SERVICE WORKER (PWA) ────────────────────────────────────────────
if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
</body>
</html>
